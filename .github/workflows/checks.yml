name: Checks

on:
  push:
    branches: [ main ]
  pull_request: {}
  schedule:
    - cron: '0 23 * * SUN-THU'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    if: (github.event_name == 'schedule' && github.repository == 'SakanaAI/shachi_refactor') || (github.event_name != 'schedule')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@v3

      - name: Install
        run: uv sync --extra dev

      - name: Output installed packages
        run: uv pip freeze || true

      - name: Output dependency tree
        run: uv tree || true

      # Standard checks (excludes existing env subdirs via pyproject.toml)
      - name: Ruff - lint
        run: uv run ruff check .
      - name: Ruff - format
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy

      # Additional checks for env entrypoints (TEMP: early-dev exception)
      - name: Check env entrypoints
        run: |
          ENV_FILES=(
            "src/shachi/env/auction_arena/auction_env.py"
            "src/shachi/env/cognitive_biases/cognitive_biases_env.py"
            "src/shachi/env/econagent/econenv.py"
            "src/shachi/env/emergent_analogies_LLM/digit_mat/digitmat_env.py"
            "src/shachi/env/emotionBench/emotionenv.py"
            "src/shachi/env/lm_caricature/lm_caricature_env.py"
            "src/shachi/env/oasis/snsenv.py"
            "src/shachi/env/psychobench/psychobench_env.py"
            "src/shachi/env/sotopia/environment.py"
            "src/shachi/env/stockagent/stockenv.py"
          )
          uv run ruff check "${ENV_FILES[@]}"
          uv run ruff format --check "${ENV_FILES[@]}"
          uv run mypy "${ENV_FILES[@]}"

      - name: pytest
        run: uv run pytest -q